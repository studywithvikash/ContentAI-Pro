<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ContentAI Pro Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<h2 class="logo">
🤖 ContentAI Pro
</h2>

<ul class="menu">

<li class="active">🏠 Dashboard</li>

<li>✍ AI Writer</li>

<li>🕒 History</li>

<li>⭐ Upgrade</li>

<li onclick="logout()">🚪 Logout</li>

</ul>

</aside>

<!-- Main -->

<main class="main">

<header class="topbar">

<h2>AI Content Generator</h2>
<button id="themeToggle">🌙 Dark Mode</button>
</header>

<!-- Generator -->

<div class="card">

<h3>Create Content</h3>

<input
type="text"
id="topic"
placeholder="Enter Topic">

<div class="row">

<select id="type">
<option>Blog Article</option>
<option>SEO Blog</option>
<option>YouTube Script</option>
<option>YouTube Title</option>
<option>YouTube Description</option>
<option>Instagram Caption</option>
<option>Instagram Hashtags</option>
<option>Facebook Post</option>
<option>LinkedIn Post</option>
<option>X (Twitter) Post</option>
<option>Email</option>
<option>Cold Email</option>
<option>Product Description</option>
<option>Amazon Product Listing</option>
<option>Advertisement Copy</option>
<option>Google Ads</option>
<option>Facebook Ads</option>
<option>Landing Page Copy</option>
<option>Business Proposal</option>
<option>Resume</option>
<option>Cover Letter</option>
<option>Press Release</option>
<option>Story</option>
<option>Essay</option>
<option>Poem</option>
<option>Speech</option>
<option>News Article</option>
<option>Rewrite Text</option>
<option>Summarize</option>
<option>Grammar Fix</option>
<option>Translate</option>
</select>

<select id="tone">

<option>Professional</option>

<option>Friendly</option>

<option>Creative</option>

</select>

<select id="length">

<option>Short</option>

<option>Medium</option>

<option>Long</option>

</select>
<select id="language">
<option>English</option>
<option>Hindi</option>
<option>Spanish</option>
<option>French</option>
<option>German</option>
<option>Arabic</option>
<option>Japanese</option>
<option>Chinese</option>
<option>Russian</option>
<option>Portuguese</option>
</select>
</div>

<button id="generateBtn">
✨ Generate Content
</button>

<button id="copyBtn">
📋 Copy
</button>
<button id="downloadPdfBtn">
📄 Download PDF
</button>
<button id="clearHistoryBtn">
🗑 Clear History
</button>
<button id="exportHistoryBtn">
📥 Export History
</button>
<div id="output" class="output">

Your AI generated content will appear here...

</div>

</div>

<!-- Bottom -->

<div class="bottomGrid">

<div class="card">

<h3>Recent History</h3>

<div id="historyList">

No history yet...

</div>

</div>

<div class="card">

<h3>Today's Usage</h3>

<h2 id="usageCount">
0 / 20
</h2>

<div class="progress">

<div
id="progressBar"
class="progressBar">
</div>

</div>

<p>Free Plan</p>

</div>

</div>

</main>

</div>

<script>

function logout(){

window.location.href="login.html";

}

</script>

<script src="script.js"></script>

</body>

</html>
