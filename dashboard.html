<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ContentAI Pro v2.0</title>

<link rel="stylesheet" href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

🤖 <span>ContentAI Pro</span>

</div>

<ul>

<li class="active">
<i class="fas fa-home"></i>
Dashboard
</li>

<li onclick="window.location.href='chat.html'">
<i class="fas fa-comments"></i>
AI Chat
</li>

<li>
<i class="fas fa-pen"></i>
AI Writer
</li>

<li>
<i class="fas fa-image"></i>
AI Images
<span class="soon">Soon</span>
</li>

<li>
<i class="fas fa-clock"></i>
History
</li>

<li>
<i class="fas fa-crown"></i>
Upgrade
</li>

<li onclick="logout()">
<i class="fas fa-right-from-bracket"></i>
Logout
</li>

</ul>

</aside>

<!-- Main -->

<main class="content">

<header class="topbar">

<div>

<h2>Welcome 👋</h2>

<p>Create amazing AI content in seconds.</p>

</div>

<div class="profile">

<img
src="https://ui-avatars.com/api/?name=Vikas&background=2563eb&color=fff"
alt="avatar">

<div>

<b>Vikas</b>

<p>Free Plan</p>

</div>

</div>

</header>

<!-- Analytics -->

<section class="stats">

<div class="stat-card">

<h3>AI Generations</h3>

<h1 id="usageCount">0 / 20</h1>

</div>

<div class="stat-card">

<h3>History</h3>

<h1 id="historyCount">0</h1>

</div>

<div class="stat-card">

<h3>Chats</h3>

<h1>0</h1>

</div>

<div class="stat-card premium">

<h3>Upgrade</h3>

<button>Go Pro 🚀</button>

</div>

</section>

<!-- AI Writer -->

<section class="writer-card">

<h2>✨ AI Writer</h2>

<input
type="text"
id="topic"
placeholder="Enter your topic...">

<div class="row">

<select id="type">
<option>Blog Article</option>
<option>YouTube Script</option>
<option>Instagram Caption</option>
<option>Email</option>
<option>Product Description</option>
<option>SEO Article</option>
<option>Facebook Ad</option>
<option>LinkedIn Post</option>
</select>

<select id="tone">
<option>Professional</option>
<option>Friendly</option>
<option>Creative</option>
<option>Funny</option>
</select>

<select id="length">
<option>Short</option>
<option>Medium</option>
<option>Long</option>
</select>

<select id="language">
<option>English</option>
<option>Hindi</option>
<option>Spanish</option>
<option>French</option>
</select>

</div>

<div class="buttons">

<button id="generateBtn">
✨ Generate
</button>

<button id="copyBtn">
📋 Copy
</button>

<button id="downloadPdfBtn">
📄 PDF
</button>

<button id="exportHistoryBtn">
📥 History
</button>

</div>

<div id="output" class="output">

AI Generated Content...

</div>

</section>
