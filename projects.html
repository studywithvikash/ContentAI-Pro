<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>My Projects | ContentAI Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

🤖 <span>ContentAI Pro</span>

</div>

<ul>

<li onclick="location.href='dashboard.html'">
🏠 Dashboard
</li>

<li onclick="location.href='chat.html'">
💬 AI Chat
</li>

<li onclick="location.href='images.html'">
🎨 AI Images
</li>

<li onclick="location.href='code.html'">
💻 AI Code
</li>

<li class="active">
📂 My Projects
</li>

<li onclick="location.href='analytics.html'">
📊 Analytics
</li>

<li onclick="location.href='templates.html'">
📄 Templates
</li>

<li onclick="location.href='login.html'">
🚪 Logout
</li>

</ul>

</aside>

<!-- Main -->

<main class="content">

<header class="topbar">

<div>

<h2>📂 My Projects</h2>

<p>Your saved AI code projects</p>

</div>

</header>

<input
type="text"
id="searchProject"
placeholder="🔍 Search Projects...">

<br><br>

<div id="projectList">

No Projects Saved...

</div>

</main>

</div>

<script>

let projects =
JSON.parse(localStorage.getItem("projects")) || [];

const list =
document.getElementById("projectList");

function renderProjects(data){

if(data.length===0){

list.innerHTML="<h3>No Projects Found</h3>";

return;

}

list.innerHTML=data.map((p,index)=>`

<div class="history-card">

<h3>${p.title}</h3>

<p><b>Language:</b> ${p.language}</p>

<p><b>Date:</b> ${p.created}</p>

<button onclick="openProject(${index})">

📂 Open

</button>

<button onclick="deleteProject(${index})">

🗑 Delete

</button>

</div>

`).join("");

}

renderProjects(projects);

function deleteProject(index){

projects.splice(index,1);

localStorage.setItem(
"projects",
JSON.stringify(projects)
);

renderProjects(projects);

}

function openProject(index){

localStorage.setItem(
"currentProject",
JSON.stringify(projects[index])
);

location.href="code.html";

}

document
.getElementById("searchProject")
.addEventListener("input",function(){

const value=this.value.toLowerCase();

const filtered=

projects.filter(p=>

p.title.toLowerCase().includes(value)

);

renderProjects(filtered);

});

</script>

</body>

</html>
