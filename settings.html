<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | ContentAI Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">
🤖 <span>ContentAI Pro</span>
</div>

<ul>

<li onclick="location.href='dashboard.html'">🏠 Dashboard</li>

<li onclick="location.href='profile.html'">👤 Profile</li>

<li class="active">⚙️ Settings</li>

<li onclick="location.href='projects.html'">📂 My Projects</li>

<li onclick="location.href='analytics.html'">📊 Analytics</li>

<li onclick="location.href='login.html'">🚪 Logout</li>

</ul>

</aside>

<!-- Main -->

<main class="content">

<header class="topbar">

<div>

<h2>⚙️ Settings</h2>

<p>Customize your ContentAI Pro experience</p>

</div>

</header>

<div class="writer-card">

<h2>🎨 Appearance</h2>

<button id="themeBtn">
🌙 Dark Mode
</button>

<hr><br>

<h2>🌐 Language</h2>

<select id="languageSetting">

<option>English</option>

<option>Hindi</option>

</select>

<hr><br>

<h2>🔔 Notifications</h2>

<label>

<input type="checkbox" id="notificationToggle">

 Enable Notifications

</label>

<hr><br>

<h2>🗑️ Storage</h2>

<div class="buttons">

<button id="clearHistoryBtn">
🗑️ Clear AI History
</button>

<button id="clearProjectsBtn">
📂 Clear Projects
</button>

</div>

<hr><br>

<h2>🚪 Account</h2>

<button id="logoutBtn">
Logout
</button>

<hr><br>

<p><b>Version:</b> ContentAI Pro v2.0</p>

</div>
<script>

// =======================
// Theme
// =======================

const themeBtn=document.getElementById("themeBtn");

if(localStorage.getItem("theme")==="dark"){

document.body.classList.add("dark");

themeBtn.innerHTML="☀️ Light Mode";

}

themeBtn.onclick=()=>{

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){

localStorage.setItem("theme","dark");

themeBtn.innerHTML="☀️ Light Mode";

}else{

localStorage.setItem("theme","light");

themeBtn.innerHTML="🌙 Dark Mode";

}

};

// =======================
// Language
// =======================

const language=document.getElementById("languageSetting");

language.value=

localStorage.getItem("language") || "English";

language.onchange=()=>{

localStorage.setItem(

"language",

language.value

);

alert("✅ Language Saved");

};

// =======================
// Notifications
// =======================

const notify=

document.getElementById("notificationToggle");

notify.checked=

localStorage.getItem("notification")==="true";

notify.onchange=()=>{

localStorage.setItem(

"notification",

notify.checked

);

};

// =======================
// Clear History
// =======================

document.getElementById("clearHistoryBtn").onclick=()=>{

if(confirm("Delete all AI History?")){

localStorage.removeItem("history");

alert("✅ History Deleted");

}

};

// =======================
// Clear Projects
// =======================

document.getElementById("clearProjectsBtn").onclick=()=>{

if(confirm("Delete all Projects?")){

localStorage.removeItem("projects");

alert("✅ Projects Deleted");

}

};

// =======================
// Logout
// =======================

document.getElementById("logoutBtn").onclick=()=>{

if(confirm("Logout from ContentAI Pro?")){

localStorage.removeItem("currentProject");

location.href="login.html";

}

};

</script>

</main>

</div>

</body>

</html>
