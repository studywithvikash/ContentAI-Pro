<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>AI Code Generator | ContentAI Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

🤖 <span>ContentAI Pro</span>

</div>

<ul>

<li onclick="location.href='dashboard.html'">

🏠 Dashboard

</li>

<li onclick="location.href='chat.html'">

💬 AI Chat

</li>

<li onclick="location.href='images.html'">

🎨 AI Images

</li>

<li class="active">

💻 AI Code

</li>

<li onclick="location.href='projects.html'">

📂 My Projects

</li>

<li onclick="location.href='analytics.html'">

📊 Analytics

</li>

<li onclick="location.href='templates.html'">

📄 Templates

</li>

<li onclick="location.href='profile.html'">

👤 Profile

</li>

<li onclick="location.href='settings.html'">

⚙️ Settings

</li>

</ul>

</aside>

<!-- Main -->

<main class="content">

<header class="topbar">

<h2>

💻 AI Code Generator

</h2>

<p>

Generate professional code with AI

</p>

</header>

<div class="writer-card">

<input

id="codePrompt"

type="text"

placeholder="Example : Create a responsive login page">

<br><br>

<div class="row">

<select id="language">

<option>HTML</option>

<option>CSS</option>

<option>JavaScript</option>

<option>Python</option>

<option>C++</option>

<option>Java</option>

<option>PHP</option>

<option>React</option>

</select>

<select id="category">

<option>Web Development</option>

<option>JavaScript</option>

<option>Python</option>

<option>Java</option>

<option>AI</option>

<option>Mobile App</option>

<option>Game Development</option>

<option>Other</option>

</select>

</div>

<br>

<div class="buttons">

<button id="generateCodeBtn">

⚡ Generate

</button>

<button id="copyCodeBtn">

📋 Copy

</button>

<button id="downloadCodeBtn">

📥 Download

</button>

<button id="previewBtn">

▶ Preview

</button>

<button id="saveProjectBtn">

💾 Save

</button>

</div>

<br>
<!-- Monaco Editor -->

<div class="editor-container">

<div class="editor-topbar">

<span>
📝 Monaco Editor
</span>

<div>

<button id="formatBtn">
✨ Format
</button>

<button id="clearBtn">
🗑 Clear
</button>

</div>

</div>

<div id="editor"></div>

</div>

<br>

<div class="output-info">

<div class="info-card">

<b>Language</b>

<p id="currentLanguage">
HTML
</p>

</div>

<div class="info-card">

<b>Status</b>

<p id="editorStatus">
Ready
</p>

</div>

<div class="info-card">

<b>Lines</b>

<p id="lineCount">
0
</p>

</div>

<div class="info-card">

<b>Characters</b>

<p id="charCount">
0
</p>

</div>

</div>

</div>

</main>

</div>

<script src="code.js"></script>

</body>

</html>
