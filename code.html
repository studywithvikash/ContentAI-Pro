<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AI Code Generator</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css">
</head>

<body>

<div class="container">

<h1>💻 AI Code Generator</h1>

<input
id="codePrompt"
type="text"
placeholder="Example: Create a responsive login page">

<select id="language">

<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>Python</option>
<option>C++</option>
<option>Java</option>
<option>PHP</option>
<option>React</option>

</select>

<button id="generateCodeBtn">

⚡ Generate Code

</button>

<button id="copyCodeBtn">

📋 Copy Code

</button>
<button id="downloadCodeBtn">
📥 Download Code
</button>
  <button id="previewBtn">
▶️ Live Preview
  </button>
<pre>
<code id="codeOutput" class="language-html">
Generated code will appear here...
</code>
</pre>

</div>

<script src="code.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
</body>

</html>
